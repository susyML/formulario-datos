function fijarPais() {
  const p = document.getElementById('select-pais').value;
  if(!p) return alert("Seleccione país");
  paisGlobal = p;
  document.getElementById('pantalla-pais').style.display = 'none';
  document.getElementById('auth-login').style.display = 'block';
}

function intentarLogin() {
  usuarioEmail = document.getElementById('login-email').value;
  document.getElementById('auth-login').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  generarSidebar();
}

function generarSidebar() {
  const menu = document.getElementById('sidebar-menu');
  menu.innerHTML = CONFIG_FORMULARIO.map((sec, i) => `<div id="side-item-${i}" class="nav-item-custom">${i+1}. ${sec.titulo}</div>`).join('');
}

function iniciarFormulario() {
  if (document.getElementById('checkTerminos').checked) {
    document.getElementById('sec-terminos').style.display = 'none';
    document.getElementById('contenedor-secciones').style.display = 'block';
    document.getElementById('barra-progreso').style.display = 'flex';
    renderizar();
  } else alert("Acepte los términos");
}

function renderizar() {
  const container = document.getElementById('contenedor-secciones');
  container.innerHTML = "";
  CONFIG_FORMULARIO.forEach((sec, idx) => {
    let html = `<div id="sec-${idx}" class="seccion-form ${idx === seccionActual ? 'activa' : ''}"><h3>${sec.titulo}</h3>`;
    sec.preguntas.forEach(p => {
      let depClass = p.dependeDe ? 'pregunta-oculta' : '';
      html += `<div class="mb-3 ${depClass}" id="div-${p.id}"><label class="form-label fw-bold">${p.label}</label>`;
      
      if(p.tipo === 'mapa') html += `<div id="map"></div><input type="hidden" name="gps" id="input-gps">`;
      else if(p.tipo === 'select') {
        html += `<select name="${p.id}" class="form-select"><option value="">Seleccione...</option>${p.opciones.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
      } else if(p.tipo === 'radio') {
        p.opciones.forEach(o => { html += `<div class="form-check"><input class="form-check-input" type="radio" name="${p.id}" value="${o}"><label class="form-check-label">${o}</label></div>`; });
      } else {
        html += `<input type="${p.tipo}" name="${p.id}" class="form-control">`;
      }
      html += `</div>`;
    });
    html += `<div class="mt-4 d-flex justify-content-between">`;
    if(idx > 0) html += `<button type="button" class="btn btn-secondary" onclick="navegar(-1)">Anterior</button>`;
    if(idx < CONFIG_FORMULARIO.length - 1) html += `<button type="button" class="btn btn-davivienda" onclick="navegar(1)">Siguiente</button>`;
    else html += `<button type="button" id="btnEnviar" class="btn btn-success" onclick="finalizar()">Enviar Datos</button>`;
    html += `</div></div>`;
    container.innerHTML += html;
  });
  actualizarSidebar();
  chequearLogica();
  if(CONFIG_FORMULARIO[seccionActual].preguntas.some(p => p.tipo === 'mapa')) setTimeout(initMapa, 500);
}

function navegar(paso) {
  document.getElementById(`sec-${seccionActual}`).classList.remove('activa');
  seccionActual += paso;
  document.getElementById(`sec-${seccionActual}`).classList.add('activa');
  actualizarSidebar();
  chequearLogica();
  if(CONFIG_FORMULARIO[seccionActual].preguntas.some(p => p.tipo === 'mapa')) setTimeout(initMapa, 500);
  window.scrollTo(0,0);
  actualizarBarra();
}

function initMapa() {
  const centro = COORDENADAS_PAISES[paisGlobal] || { lat: 13.689, lng: -89.187 };
  const mapDiv = document.getElementById("map");
  if(!mapDiv) return;
  
  mapa = new google.maps.Map(mapDiv, { zoom: 14, center: centro });
  marcador = new google.maps.Marker({ position: centro, map: mapa, draggable: true });
  
  google.maps.event.addListener(marcador, 'dragend', function() {
    document.getElementById('input-gps').value = marcador.getPosition().lat().toFixed(6) + "," + marcador.getPosition().lng().toFixed(6);
  });
}

function chequearLogica() {
  const form = document.getElementById('mainForm');
  const formData = new FormData(form);
  
  CONFIG_FORMULARIO.forEach(sec => {
    sec.preguntas.forEach(p => {
      if(p.dependeDe) {
        const val = formData.get(p.dependeDe);
        const div = document.getElementById(`div-${p.id}`);
        const match = Array.isArray(p.valorPadre) ? p.valorPadre.includes(val) : val === p.valorPadre;
        if(div) div.style.display = match ? 'block' : 'none';
      }
    });
  });
}

function actualizarSidebar() {
  CONFIG_FORMULARIO.forEach((_, i) => {
    const el = document.getElementById(`side-item-${i}`);
    if(el) {
      el.classList.remove('active', 'completed');
      if(i < seccionActual) el.classList.add('completed');
      if(i === seccionActual) el.classList.add('active');
    }
  });
}

function actualizarBarra() {
  const pct = ((seccionActual + 1) / CONFIG_FORMULARIO.length) * 100;
  document.getElementById('bar').style.width = pct + '%';
}

function finalizar() {
  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.innerText = "Guardando...";

  const form = document.getElementById('mainForm');
  const formData = new FormData(form);
  const data = { "País": paisGlobal, "Email de Usuario": usuarioEmail };
  
  // Recolectar datos manualmente para asegurar nombres de columnas
  CONFIG_FORMULARIO.forEach(sec => {
    sec.preguntas.forEach(p => {
      if(p.tipo === 'mapa') {
        data[p.label] = document.getElementById('input-gps').value;
      } else {
        data[p.label] = formData.get(p.id) || "";
      }
    });
  });

  // IMPORTANTE: REEMPLAZA ESTA URL CON TU URL DE GOOGLE APPS SCRIPT
  const urlGoogle = "https://script.google.com/macros/s/AKfycbwqCb-fH0MwT8FtVd_vqQMoiPkQfb84jLt1Iogn1CuYDLXFUTPXqt2eFmYx99IEqjp5BQ/exec";

  fetch(urlGoogle, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(data)
  }).then(() => {
    alert("¡Datos guardados con éxito!");
    location.reload();
  }).catch(e => {
    alert("Error de conexión");
    btn.disabled = false;
  });
}
